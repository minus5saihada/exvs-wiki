services:
  payload-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: exvs_wiki
    ports:
      - '5432:5432'
    volumes:
      - payload_db_data:/var/lib/postgresql/data

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    ports:
      - '8090:8090'
    volumes:
      - pocketbase_data:/pb/pb_data
    environment:
      PB_ENCRYPTION_KEY: ${PB_ENCRYPTION_KEY}

  umami-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
      POSTGRES_DB: umami
    volumes:
      - umami_db_data:/var/lib/postgresql/data

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      - umami-db

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://payload:payload@payload-db:5432/exvs_wiki
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL}
      NEXT_PUBLIC_UMAMI_URL: ${NEXT_PUBLIC_UMAMI_URL}
    depends_on:
      - payload-db

volumes:
  payload_db_data:
  pocketbase_data:
  umami_db_data:
